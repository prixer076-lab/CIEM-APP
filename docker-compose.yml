services:
  db:
    image: postgres:16-alpine
    container_name: ciem-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ciem}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-AEP076AEP}
    ports:
      - "${DB_PUBLIC_PORT:-55432}:5432"
    volumes:
      - ciem-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ciem"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ciem-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      API_PREFIX: ${API_PREFIX:-api}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:55173,http://frontend:5173}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:AEP076AEP@db:5432/ciem}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-ciem}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-AEP076AEP}
    ports:
      - "${BACKEND_PUBLIC_PORT:-54000}:${PORT:-4000}"
    volumes:
      - ./backend:/app
      - ciem-backend-node-modules:/app/node_modules
    command: node --watch --require ts-node/register --require tsconfig-paths/register src/main.ts

  frontend:
    build:
      context: ./CIEM
    container_name: ciem-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:54000/api/v1}
    ports:
      - "${FRONTEND_PUBLIC_PORT:-55173}:5173"
    volumes:
      - ./CIEM:/app
      - ciem-frontend-node-modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  ciem-postgres-data:
  ciem-backend-node-modules:
  ciem-frontend-node-modules:
